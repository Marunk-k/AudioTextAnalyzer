<!doctype html><html xmlns:th='http://www.thymeleaf.org'><head><meta charset='UTF-8'><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'></head><body><div class='container py-4'><h2 th:text='${project.title}'></h2><p>Статус: <b id='statusBadge' th:text='${project.status}'></b></p><form method='post' th:action='@{/projects/{id}/process(id=${project.id})}' class='mb-3'><button class='btn btn-primary'>Начать обработку</button></form><div class='mb-3'><a class='btn btn-outline-success btn-sm' th:href='@{/projects/{id}/export/txt(id=${project.id})}'>Экспорт TXT</a> <a class='btn btn-outline-success btn-sm' th:href='@{/projects/{id}/export/json(id=${project.id})}'>Экспорт JSON</a></div><h5>Исходный текст</h5><pre th:text='${project.rawText}'></pre><h5>Обработанный текст</h5><form method='post' th:action='@{/projects/{id}/text/processed(id=${project.id})}'><textarea name='processedText' class='form-control' rows='10' th:text='${project.processedText}'></textarea><div class='mt-2'><button class='btn btn-primary btn-sm'>Сохранить изменения</button></div></form><form method='post' th:action='@{/projects/{id}/text/reprocess(id=${project.id})}' class='mt-2'><button class='btn btn-outline-secondary btn-sm'>Применить обработку заново</button></form><hr><h5>AI-версия</h5><div class='alert alert-warning'>Используется демонстрационный AI-режим, так как параметры GigaChat не настроены.</div><pre th:text='${project.aiText}'></pre><form method='post' th:action='@{/projects/{id}/text/ai-improve(id=${project.id})}'><button class='btn btn-warning btn-sm'>Улучшить через AI</button></form></div><script src='/js/app.js'></script><script th:inline='javascript'>pollStatus([[${project.id}]]);</script></body></html>
