<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Загрузка аудио</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container page-shell">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="soft-card p-4 upload-card">
        <h2 class="mb-2">Загрузить аудиофайл</h2>
        <p class="text-muted-custom">Поддерживаемые форматы: WAV, MP3, M4A, OGG, FLAC.</p>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <form method="post" action="/upload" enctype="multipart/form-data">
          <label class="form-label">Название проекта</label>
          <input class="form-control mb-3" name="title" placeholder="Например: Лекция по БД" required>
          <label class="form-label">Файл аудио</label>
          <input class="form-control mb-3" type="file" name="file" required>
          <button class="btn btn-pink pill-button w-100">Загрузить</button>
        </form>
      </div>
    </div>
  </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
