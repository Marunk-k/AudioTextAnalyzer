<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Проекты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
  <h2>Проекты</h2>
  <table class="table table-striped card-soft">
    <thead><tr><th>ID</th><th>Название</th><th>Статус</th><th></th></tr></thead>
    <tbody>
    <tr th:each="p : ${projects}">
      <td th:text="${p.id}"></td>
      <td th:text="${p.title}"></td>
      <td><span class="badge bg-secondary status-badge" th:text="${p.status}"></span></td>
      <td><a class="btn btn-sm btn-outline-primary" th:href="@{/projects/{id}(id=${p.id})}">Открыть</a></td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
