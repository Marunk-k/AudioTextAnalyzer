<!doctype html><html xmlns:th='http://www.thymeleaf.org' lang='ru'><head><meta charset='UTF-8'><title>Справка</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link href='/css/app.css' rel='stylesheet'></head><body style='background:var(--sage-soft)'><div th:replace='~{fragments/navbar :: navbar}'></div><main class='container page-shell'><div class='soft-card p-4'><h2>Справка</h2><div class='accordion' id='faq'><div class='accordion-item' th:each='q,i:${#arrays.asList("Какие форматы аудио поддерживаются?","Почему может использоваться mock-режим?","Куда нужно положить модель Vosk?","Как работает алгоритмическая обработка?","Что делает AI-доработка?","Какие форматы экспорта доступны?","Почему качество распознавания может быть разным?","Как подготовить аудио для лучшего результата?")}'><h2 class='accordion-header'><button class='accordion-button collapsed' data-bs-toggle='collapse' th:attr='data-bs-target=${"#c"+i.index}' th:text='${q}'></button></h2><div class='accordion-collapse collapse' th:id='${"c"+i.index}'><div class='accordion-body'>Подробное пояснение доступно в README и настройках приложения.</div></div></div></div></div></main><div th:replace='~{fragments/footer :: footer}'></div><script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script></body></html>
