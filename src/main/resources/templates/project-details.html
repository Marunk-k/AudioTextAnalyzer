<!doctype html><html xmlns:th='http://www.thymeleaf.org'><head><meta charset='UTF-8'><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'></head><body><div class='container py-4'><h2 th:text='${project.title}'></h2><p>Статус: <b th:text='${project.status}'></b></p><form method='post' th:action='@{/projects/{id}/process(id=${project.id})}'><button class='btn btn-primary'>Начать обработку</button></form><hr><h5>Исходный текст</h5><pre th:text='${project.rawText}'></pre><h5>Обработанный текст</h5><pre th:text='${project.processedText}'></pre></div></body></html>
