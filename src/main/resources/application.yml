spring:
  application:
    name: audiotext-analyzer
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  datasource:
    url: jdbc:postgresql://localhost:5432/audiotext_analyzer
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

app:
  temp-dir: data/temp
  audio:
    ffmpeg-path: ffmpeg
    allowed-extensions: [wav, mp3, m4a, ogg, flac]
  vosk:
    enabled: true
    model-path: models/vosk-model-small-ru
    sample-rate: 16000
  gigachat:
    enabled: true
    credentials: ${GIGACHAT_CREDENTIALS:}
    scope: ${GIGACHAT_SCOPE:GIGACHAT_API_PERS}
    model: ${GIGACHAT_MODEL:GigaChat}
    verify-ssl-certs: false
    timeout-seconds: 60
  processing:
    use-mock-transcription-if-vosk-unavailable: true
    low-confidence-threshold: 0.6
