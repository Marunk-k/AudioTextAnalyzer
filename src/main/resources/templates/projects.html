<!doctype html><html xmlns:th='http://www.thymeleaf.org'><head><meta charset='UTF-8'><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'></head><body><div class='container py-4'><h2>Проекты</h2><table class='table'><tr><th>ID</th><th>Название</th><th>Статус</th><th></th></tr><tr th:each='p:${projects}'><td th:text='${p.id}'></td><td th:text='${p.title}'></td><td th:text='${p.status}'></td><td><a class='btn btn-sm btn-outline-primary' th:href='@{/projects/{id}(id=${p.id})}'>Открыть</a></td></tr></table></div></body></html>
