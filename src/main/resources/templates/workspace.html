<!doctype html><html xmlns:th='http://www.thymeleaf.org' lang='ru'><head><meta charset='UTF-8'><title>Рабочая область</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link href='/css/app.css' rel='stylesheet'></head><body><div th:replace='~{fragments/navbar :: navbar}'></div><main class='container page-shell'><h2>Рабочая область</h2><p class='text-muted-custom'>Загрузите аудиофайл и запустите обработку.</p><div class='workspace-grid'><div class='soft-card p-4'><h5>Новый проект</h5><form method='post' action='/upload' enctype='multipart/form-data'><input name='title' class='form-control mb-2' placeholder='Название проекта' required><div class='upload-card p-4 mb-2 text-center border border-2 border-dashed'>Перетащите файл сюда или выберите ниже</div><input type='file' name='file' class='form-control mb-2' required><button class='btn btn-pink w-100'>Загрузить</button></form></div><div class='soft-card p-4' style='background:var(--sage-soft)'><h5>Этапы обработки</h5><ul class='step-list'><li class='step-item'>1. Загрузка файла</li><li class='step-item'>2. Конвертация</li><li class='step-item'>3. Распознавание</li><li class='step-item'>4. Постобработка</li><li class='step-item'>5. Анализ</li><li class='step-item'>6. Экспорт</li></ul></div></div></main><div th:replace='~{fragments/footer :: footer}'></div></body></html>
