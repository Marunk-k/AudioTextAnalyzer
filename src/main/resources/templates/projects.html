<!doctype html><html xmlns:th='http://www.thymeleaf.org'><head><meta charset='UTF-8'><title>История проектов</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link href='/css/app.css' rel='stylesheet'></head><body><div th:replace='fragments/navbar :: navbar'></div><main class='container page-shell'><div class='d-flex justify-content-between align-items-center'><h2>История проектов</h2><a href='/workspace' class='btn btn-pink'>Загрузить новый файл</a></div><div th:if='${#lists.isEmpty(projects)}' class='empty-state mt-3'><h5>История пока пуста</h5><p>Загрузите первый аудиофайл, чтобы увидеть результат здесь.</p></div><div class='row g-3 mt-1' th:if='${!#lists.isEmpty(projects)}'><div class='col-md-6' th:each='p:${projects}'><div class='soft-card p-3'><div class='d-flex justify-content-between'><h5 th:text='${p.title}'></h5><span class='badge bg-secondary' th:text='${p.status}'></span></div><p class='text-muted-custom' th:text='${p.originalFileName}'></p><a th:href='@{/projects/{id}(id=${p.id})}' class='btn btn-soft btn-sm'>Открыть проект</a></div></div></div></main><div th:replace='fragments/footer :: footer'></div></body></html>
